<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Debales AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #05070c;
      --panel: #0c111d;
      --surface: #121a29;
      --line: #223047;
      --text: #eef3ff;
      --muted: #9ba8bc;
      --blue: #3b82f6;
      --rag: #10c98f;
      --serp: #f59e0b;
      --both: #a78bfa;
      --none: #94a3b8;
      --direct: #38bdf8;
      --danger: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "DM Sans", system-ui, sans-serif;
      letter-spacing: 0;
    }
    button, textarea { font: inherit; }
    button { cursor: pointer; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 86px;
      padding: 10px 24px;
      background: rgba(5, 7, 12, 0.96);
      border-bottom: 1px solid var(--line);
    }
    .brand { display: flex; align-items: center; gap: 14px; }
    .brand img {
      width: 64px;
      height: 64px;
      object-fit: contain;
      flex: 0 0 auto;
    }
    .wordmark {
      position: relative;
      display: inline-block;
      font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;
      font-size: 34px;
      font-weight: 900;
      line-height: .9;
      text-transform: uppercase;
      letter-spacing: 2px;
      transform: scaleX(1.35);
      transform-origin: left center;
      color: #f7fbff;
      text-shadow: 0 0 18px rgba(80, 118, 255, .28);
      overflow: hidden;
    }
    .wordmark::before,
    .wordmark::after {
      content: "";
      position: absolute;
      left: -4px;
      right: -4px;
      height: 6px;
      background: var(--bg);
      opacity: .95;
      pointer-events: none;
    }
    .wordmark::before { top: 36%; }
    .wordmark::after { top: 62%; height: 4px; }
    .wordmark span {
      display: inline-block;
      transform: skewX(-4deg);
    }
    .badges { display: flex; gap: 8px; align-items: center; }
    .badge, .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 4px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .shell {
      display: grid;
      grid-template-columns: minmax(520px, 1fr) 300px;
      height: calc(100vh - 86px);
      min-height: 650px;
      transition: grid-template-columns 180ms ease;
    }
    .shell.trace-off {
      grid-template-columns: minmax(520px, 1fr) 0;
    }
    .trace {
      background: var(--panel);
      overflow: auto;
    }
    .trace {
      border-right: 0;
      border-left: 1px solid var(--line);
      transition: width 180ms ease, opacity 180ms ease;
    }
    .trace.closed { width: 0; opacity: 0; overflow: hidden; border-left: 0; }
    h2 {
      margin: 0 0 12px;
      font-size: 13px;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0;
    }
    .prompt-list { display: grid; gap: 10px; margin-bottom: 26px; }
    .prompt-menu {
      position: absolute;
      right: 118px;
      bottom: 48px;
      width: 330px;
      max-height: 430px;
      overflow: auto;
      display: none;
      padding: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, .35);
      z-index: 20;
    }
    .prompt-menu.open { display: block; }
    .prompt-menu .prompt-list { margin-bottom: 0; }
    .prompt {
      width: 100%;
      text-align: left;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
    }
    .prompt:hover, .icon-btn:hover, .send:hover { border-color: var(--blue); }
    .prompt span:last-child {
      display: block;
      margin-top: 7px;
      color: var(--muted);
      line-height: 1.35;
    }
    .tag.rag { color: var(--rag); border-color: rgba(16, 201, 143, .55); }
    .tag.serp { color: var(--serp); border-color: rgba(245, 158, 11, .55); }
    .tag.both { color: var(--both); border-color: rgba(167, 139, 250, .55); }
    .tag.none { color: var(--none); }
    .tag.direct { color: var(--direct); }
    .legend { display: grid; gap: 10px; color: var(--muted); font-size: 13px; }
    .legend-row { display: flex; align-items: center; gap: 9px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--none); flex: 0 0 auto; }
    .dot.rag { background: var(--rag); }
    .dot.serp { background: var(--serp); }
    .dot.both { background: var(--both); }
    .dot.direct { background: var(--direct); }
    .dot.none { background: var(--none); }
    .chat {
      min-width: 0;
      display: grid;
      grid-template-rows: 1fr auto;
      background: #070b12;
    }
    .thread {
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .message { max-width: 78%; }
    .message.user { align-self: flex-end; }
    .bubble {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px 14px;
      line-height: 1.52;
      white-space: pre-wrap;
    }
    .user .bubble {
      background: #102042;
      border-bottom-right-radius: 3px;
    }
    .assistant .bubble {
      background: var(--surface);
      border-bottom-left-radius: 3px;
    }
    .assistant .tag { margin-bottom: 9px; }
    .context {
      margin-top: 10px;
      border-top: 1px solid var(--line);
      padding-top: 10px;
      color: var(--muted);
      font-size: 12px;
      max-height: 160px;
      overflow: auto;
      white-space: pre-wrap;
    }
    .composer {
      position: relative;
      padding: 16px 20px;
      background: var(--panel);
      border-top: 1px solid var(--line);
    }
    .input-row { display: flex; gap: 10px; align-items: flex-end; }
    textarea {
      width: 100%;
      max-height: 120px;
      min-height: 48px;
      resize: none;
      background: #070b12;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      outline: none;
    }
    textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59, 130, 246, .18); }
    .send, .icon-btn {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      border-radius: 8px;
      min-height: 42px;
      padding: 0 14px;
      font-weight: 700;
    }
    .send:disabled { opacity: .45; cursor: not-allowed; }
    .toolbar { display: flex; justify-content: space-between; gap: 12px; margin-top: 10px; color: var(--muted); font-size: 12px; }
    .tool-actions { display: flex; gap: 8px; }
    .typing { display: inline-flex; gap: 5px; align-items: center; height: 22px; }
    .typing i { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: bounce 1s infinite ease-in-out; }
    .typing i:nth-child(2) { animation-delay: .12s; }
    .typing i:nth-child(3) { animation-delay: .24s; }
    @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); opacity: .4; } 40% { transform: translateY(-5px); opacity: 1; } }
    .trace-inner { width: 300px; padding: 18px; }
    .trace-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .live { color: var(--rag); font-size: 12px; font-weight: 700; }
    .timeline { position: relative; display: grid; gap: 14px; margin-left: 4px; }
    .step { display: grid; grid-template-columns: 18px 1fr; gap: 10px; position: relative; }
    .step:not(:last-child)::after { content: ""; position: absolute; left: 4px; top: 14px; bottom: -16px; width: 1px; background: var(--line); }
    .step strong { display: block; font-size: 13px; }
    .step p { margin: 4px 0 0; color: var(--muted); font-size: 12px; line-height: 1.4; }
    .decision {
      margin-top: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: var(--surface);
    }
    .decision p { color: var(--muted); margin: 8px 0 0; font-size: 12px; line-height: 1.4; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="/static/debales-logo.png" alt="Debales AI glowing logo">
      <div class="wordmark"><span>Debales AI</span></div>
    </div>
    <div class="badges">
      <span class="badge">LangGraph</span>
      <span class="tag rag">RAG</span>
      <span class="tag serp">SerpAPI</span>
      <span class="tag both">Mixed</span>
    </div>
  </header>
  <main class="shell" id="shell">
    <section class="chat">
      <div class="thread" id="thread"></div>
      <form class="composer" id="form">
        <div class="input-row">
          <textarea id="input" rows="1" placeholder="Ask about Debales AI or a general question..."></textarea>
          <button class="send" id="send" type="submit" disabled>Send</button>
        </div>
        <div class="toolbar">
          <span>Powered by LangGraph, RAG and SerpAPI routing</span>
          <div class="tool-actions">
            <button class="icon-btn" id="promptToggle" type="button">Example prompts</button>
            <button class="icon-btn" id="traceToggle" type="button">Agent trace</button>
            <button class="icon-btn" id="clear" type="button">Clear chat</button>
          </div>
        </div>
        <div class="prompt-menu" id="promptMenu">
          <h2>Example Prompts</h2>
          <div class="prompt-list" id="prompts"></div>
          <h2>Routing Legend</h2>
          <div class="legend">
            <div class="legend-row"><span class="dot rag"></span><span>RAG: Debales knowledge base</span></div>
            <div class="legend-row"><span class="dot serp"></span><span>SerpAPI: external search</span></div>
            <div class="legend-row"><span class="dot both"></span><span>Mixed: RAG + SerpAPI</span></div>
          </div>
        </div>
      </form>
    </section>
    <section class="trace" id="trace">
      <div class="trace-inner">
        <div class="trace-head"><h2>Agent Trace</h2><span class="live">Live</span></div>
        <div class="timeline" id="timeline"></div>
        <div class="decision" id="decision">
          <span class="tag direct">Ready</span>
          <p>Send a message to see the latest route decision.</p>
        </div>
      </div>
    </section>
  </main>
  <script>
    const API_URL = "/api/chat";
    const EXAMPLE_PROMPTS = [
      { source: "rag", text: "What does Debales AI do?" },
      { source: "rag", text: "What services do you guys provide?" },
      { source: "serp", text: "What is LangGraph used for?" },
      { source: "serp", text: "What are the latest AI trends in logistics?" },
      { source: "both", text: "Compare Debales AI with current logistics automation tools." },
      { source: "both", text: "How does Debales AI fit into the 2026 freight tech market?" }
    ];
    const LABELS = { rag: "RAG", serp: "SerpAPI", both: "RAG + SerpAPI", none: "No Context", direct: "Direct" };
    const thread = document.getElementById("thread");
    const input = document.getElementById("input");
    const send = document.getElementById("send");
    const form = document.getElementById("form");
    const prompts = document.getElementById("prompts");
    const promptMenu = document.getElementById("promptMenu");
    const timeline = document.getElementById("timeline");
    const decision = document.getElementById("decision");
    const trace = document.getElementById("trace");
    EXAMPLE_PROMPTS.forEach(item => {
      const button = document.createElement("button");
      button.className = "prompt";
      button.type = "button";
      button.innerHTML = `<span class="tag ${item.source}">${LABELS[item.source]}</span><span>${escapeHtml(item.text)}</span>`;
      button.addEventListener("click", () => {
        promptMenu.classList.remove("open");
        sendMessage(item.text);
      });
      prompts.appendChild(button);
    });
    function escapeHtml(value) {
      return value.replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }
    function addMessage(role, text, meta = {}) {
      const wrapper = document.createElement("div");
      wrapper.className = `message ${role}`;
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      if (role === "assistant") {
        const source = meta.source || "direct";
        bubble.innerHTML = `<span class="tag ${source}">${LABELS[source] || source}</span>${escapeHtml(text)}`;
        if (meta.context?.length) {
          const ctx = document.createElement("div");
          ctx.className = "context";
          ctx.textContent = meta.context.map(item => `${item.label}\n${item.text}`).join("\n\n");
          bubble.appendChild(ctx);
        }
      } else {
        bubble.textContent = text;
      }
      wrapper.appendChild(bubble);
      thread.appendChild(wrapper);
      thread.scrollTop = thread.scrollHeight;
      return wrapper;
    }
    function addTyping() {
      const wrapper = document.createElement("div");
      wrapper.className = "message assistant";
      wrapper.innerHTML = `<div class="bubble"><span class="typing"><i></i><i></i><i></i></span></div>`;
      thread.appendChild(wrapper);
      thread.scrollTop = thread.scrollHeight;
      return wrapper;
    }
    async function sendMessage(text) {
      const message = text.trim();
      if (!message) return;
      addMessage("user", message);
      input.value = "";
      resizeInput();
      send.disabled = true;
      const typing = addTyping();
      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message })
        });
        const data = await response.json();
        typing.remove();
        if (!response.ok) throw new Error(data.error || "Request failed.");
        addMessage("assistant", data.answer, data);
        updateTrace(data);
      } catch (error) {
        typing.remove();
        addMessage("assistant", `I could not reach the backend: ${error.message}`, { source: "none" });
      }
    }
    function updateTrace(data) {
      const source = data.source || "none";
      timeline.innerHTML = "";
      (data.trace || []).forEach(step => {
        const row = document.createElement("div");
        row.className = "step";
        row.innerHTML = `<span class="dot ${source}"></span><div><strong>${escapeHtml(step.label)}</strong><p>${escapeHtml(step.desc)}</p></div>`;
        timeline.appendChild(row);
      });
      const route = data.decision?.route || LABELS[source] || source;
      const reason = data.decision?.reason || "Route decision returned by the backend.";
      decision.innerHTML = `<span class="tag ${source}">${escapeHtml(route)}</span><p>${escapeHtml(reason)}</p>`;
    }
    function resizeInput() {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 120) + "px";
      send.disabled = input.value.trim().length === 0;
    }
    form.addEventListener("submit", event => {
      event.preventDefault();
      sendMessage(input.value);
    });
    input.addEventListener("input", resizeInput);
    input.addEventListener("keydown", event => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        form.requestSubmit();
      }
    });
    document.getElementById("traceToggle").addEventListener("click", () => {
      trace.classList.toggle("closed");
      document.getElementById("shell").classList.toggle("trace-off");
    });
    document.getElementById("promptToggle").addEventListener("click", () => promptMenu.classList.toggle("open"));
    document.addEventListener("click", event => {
      if (!promptMenu.contains(event.target) && event.target.id !== "promptToggle") {
        promptMenu.classList.remove("open");
      }
    });
    document.getElementById("clear").addEventListener("click", () => {
      thread.innerHTML = "";
      addMessage("assistant", "Welcome. Ask me about Debales AI, or ask a general question and I will route it to the right source.", { source: "direct" });
    });
    addMessage("assistant", "Welcome. Ask me about Debales AI, or ask a general question and I will route it to the right source.", { source: "direct" });
  </script>
</body>
</html>
